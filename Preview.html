<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI4 Website Preview</title>
  <style>
    :root {
      --bg: #05070d;
      --panel: #0d141f;
      --ink: #f8f4e9;
      --muted: #aeb6bf;
      --line: rgba(248, 244, 233, .14);
      --cyan: #66d9ff;
      --gold: #d8a84b;
      --green: #62d68d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 12%, rgba(216, 168, 75, .18), transparent 30%),
        radial-gradient(circle at 84% 8%, rgba(102, 217, 255, .16), transparent 32%),
        linear-gradient(180deg, #05070d, #0c1016 58%, #05070d);
    }

    a { color: inherit; }

    .shell {
      width: min(1440px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 44px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 16px 0 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 1000;
    }

    .mark {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      border: 1px solid rgba(216, 168, 75, .58);
      background: linear-gradient(145deg, #1b1208, #071726);
      color: #ffe0a0;
      letter-spacing: -.04em;
    }

    .brand small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: .16em;
      text-transform: uppercase;
      font-weight: 850;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      appearance: none;
      border: 0;
      cursor: pointer;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 999px;
      text-decoration: none;
      color: #071018;
      background: linear-gradient(135deg, #fff6e1, var(--cyan), var(--green));
      font-weight: 1000;
      white-space: nowrap;
    }

    .btn.ghost {
      color: var(--ink);
      background: rgba(255, 255, 255, .06);
      border: 1px solid var(--line);
    }

    .layout {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      gap: 18px;
      align-items: stretch;
    }

    aside {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(13, 20, 31, .86);
      padding: 22px;
      min-height: 620px;
    }

    aside h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 4vw, 52px);
      line-height: .94;
      letter-spacing: -.06em;
    }

    aside p {
      color: var(--muted);
      line-height: 1.6;
    }

    .meta {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }

    .meta div {
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }

    .meta strong {
      display: block;
      color: var(--gold);
      font-size: 11px;
      letter-spacing: .16em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .preview-wrap {
      min-height: 620px;
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      background: #fff5df;
      box-shadow: 0 30px 90px rgba(0, 0, 0, .34);
    }

    iframe {
      width: 100%;
      height: min(78vh, 860px);
      min-height: 620px;
      border: 0;
      display: block;
      background: white;
    }

    textarea {
      position: fixed;
      left: -9999px;
      top: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
    }

    @media (max-width: 980px) {
      header, .layout { grid-template-columns: 1fr; }
      header { align-items: flex-start; flex-direction: column; }
      .toolbar { justify-content: flex-start; }
      aside { min-height: auto; }
    }

    @media (max-width: 620px) {
      .toolbar, .btn { width: 100%; }
      iframe { height: 720px; min-height: 720px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand">
        <div class="mark" aria-hidden="true">AI4</div>
        <div>
          Website Preview
          <small>5-Karat Website Direction</small>
        </div>
      </div>
      <div class="toolbar">
        <a class="btn ghost" href="index.html#builder">Edit Answers</a>
        <button class="btn ghost" id="copyCode" type="button">Copy HTML</button>
        <button class="btn ghost" id="downloadCode" type="button">Download HTML</button>
        <a class="btn" href="offer.html">Continue</a>
      </div>
    </header>

    <main class="layout">
      <aside>
        <h1 id="title">Generated Website</h1>
        <p id="summary">The website preview is loading.</p>
        <div class="meta">
          <div><strong>Design System</strong><span id="designSystem">AI4 Preview</span></div>
          <div><strong>Visual Signature</strong><span id="visualSignature">Purpose-led website direction</span></div>
          <div><strong>Contact</strong><span id="contactLine">Available in the generated site</span></div>
        </div>
      </aside>
      <section class="preview-wrap" aria-label="Generated website preview">
        <iframe id="previewFrame" title="Generated website preview"></iframe>
      </section>
    </main>
  </div>
  <textarea id="codeBuffer" readonly></textarea>

  <script>
    const $ = id => document.getElementById(id);

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function readValue(key) {
      try { return localStorage.getItem(key) || sessionStorage.getItem(key); }
      catch (error) {
        try { return sessionStorage.getItem(key); } catch (_) { return ""; }
      }
    }

    function readJson(key) {
      try {
        const raw = readValue(key);
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        return null;
      }
    }

    function sampleData() {
      return {
        websiteTitle: "Sample AI4 Website",
        purpose: "Business",
        headline: "A more trusted way to move forward with confidence.",
        subheadline: "A premium service presence designed for clarity, credibility, and action.",
        primaryCta: "Start the Conversation",
        secondaryCta: "View Services",
        eyebrow: "AI4 Premium Service Presence",
        valueStatement: "Focused expertise, elevated presentation, and a service experience built around the outcome that matters most.",
        aboutCopy: "This preview appears when no saved intake data is available. Start from the home page to generate a custom version.",
        trustHeadline: "Confidence before the conversation.",
        trustBody: "Trust is built through clarity, follow-through, and practical expertise.",
        contactHeadline: "Start with a precise next step.",
        contactBody: "Share what you need and what matters most.",
        contactLine: "hello@example.com | {{PHONE}}",
        socials: "Social links available upon request",
        footerLine: "Built by AI4 for trust, clarity, and conversion.",
        ctaLink: "offer.html",
        designSystem: "Sample 5-Karat Direction",
        visualSignature: "structured grid, warm editorial contrast, and premium contact path",
        creativeDirection: "A purpose-built website direction created by AI4 Design Studio."
      };
    }

    function buildFallbackHtml(data) {
      return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>${escapeHtml(data.websiteTitle)}</title>
<style>
:root{--ink:#17110c;--muted:#655a4c;--paper:#fff5df;--dark:#100d0a;--line:rgba(23,17,12,.16)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--paper)}.hero{min-height:90vh;padding:42px clamp(24px,6vw,76px);display:grid;align-content:space-between;background:linear-gradient(90deg,rgba(23,17,12,.08) 1px,transparent 1px),linear-gradient(rgba(23,17,12,.08) 1px,transparent 1px),#fff5df;background-size:44px 44px}nav{display:flex;justify-content:space-between;gap:20px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:950}.copy h1{font-family:Georgia,serif;font-size:clamp(52px,9vw,118px);line-height:.86;letter-spacing:-.07em;margin:0 0 24px}.copy p{max-width:680px;color:var(--muted);font-size:clamp(18px,2vw,23px);line-height:1.62}.cta{display:inline-flex;margin-top:18px;background:var(--dark);color:#fff1d3;text-decoration:none;padding:16px 23px;border-radius:999px;font-weight:950}.sections{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--line)}.block{padding:40px;border-right:1px solid var(--line)}.block h2{font-family:Georgia,serif;font-size:38px;line-height:1;margin:0 0 16px}.block p{color:var(--muted);line-height:1.7}.contact{padding:60px;background:var(--dark);color:#fff4df;display:grid;grid-template-columns:1fr 1fr;gap:30px}.contact h2{font-family:Georgia,serif;font-size:64px;line-height:.95;letter-spacing:-.06em;margin:0}.contact p{color:rgba(255,244,223,.74);line-height:1.7}@media(max-width:760px){nav,.sections,.contact{grid-template-columns:1fr;display:grid}.block{border-right:0;border-bottom:1px solid var(--line)}}
</style>
</head>
<body>
<main>
<section class="hero"><nav><div>${escapeHtml(data.websiteTitle)}</div><div>${escapeHtml(data.purpose)} Website | {{CITY}}</div></nav><div class="copy"><div>${escapeHtml(data.eyebrow)}</div><h1>${escapeHtml(data.headline)}</h1><p>${escapeHtml(data.subheadline)}</p><a class="cta" href="${escapeHtml(data.ctaLink)}">${escapeHtml(data.primaryCta)}</a></div></section>
<section class="sections"><div class="block"><h2>Built for the right first impression.</h2><p>${escapeHtml(data.valueStatement)}</p></div><div class="block"><h2>Clear, polished, and intentional.</h2><p>${escapeHtml(data.aboutCopy)}</p></div><div class="block"><h2>${escapeHtml(data.trustHeadline)}</h2><p>${escapeHtml(data.trustBody)}</p></div></section>
<section class="contact"><h2>${escapeHtml(data.contactHeadline)}</h2><div><p>${escapeHtml(data.contactBody)}</p><p>${escapeHtml(data.contactLine)}</p><p>${escapeHtml(data.socials)}</p><a class="cta" href="${escapeHtml(data.ctaLink)}">${escapeHtml(data.primaryCta)}</a></div></section>
</main>
</body>
</html>`;
    }

    function currentPreview() {
      const data = readJson("fiveKaratPreview") || sampleData();
      const html = readValue("ai4_built_html") || buildFallbackHtml(data);
      return { data, html };
    }

    function filenameFromTitle(title) {
      const slug = String(title || "ai4-website")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-|-$/g, "") || "ai4-website";
      return `${slug}.html`;
    }

    async function copyHtml(html) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(html);
        return;
      }
      const buffer = $("codeBuffer");
      buffer.value = html;
      buffer.select();
      document.execCommand("copy");
    }

    function render() {
      const { data, html } = currentPreview();
      $("title").textContent = data.websiteTitle || "Generated Website";
      $("summary").textContent = data.creativeDirection || "A purpose-built website direction created by AI4 Design Studio.";
      $("designSystem").textContent = data.designSystem || "AI4 5-Karat Direction";
      $("visualSignature").textContent = data.visualSignature || "Purpose-led website direction";
      $("contactLine").textContent = data.contactLine || "Available in the generated site";
      $("previewFrame").srcdoc = html;

      $("copyCode").addEventListener("click", async () => {
        await copyHtml(html);
        $("copyCode").textContent = "Copied";
        setTimeout(() => $("copyCode").textContent = "Copy HTML", 1400);
      });

      $("downloadCode").addEventListener("click", () => {
        const blob = new Blob([html], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filenameFromTitle(data.websiteTitle);
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 800);
      });
    }

    render();
  </script>
</body>
</html>
